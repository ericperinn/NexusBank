name: CI - NexusBank Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]

env:
  DOTNET_CORE_VERSION: 10.0.x

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
        
    - name: Restore
      run: dotnet restore "NexusBank.slnx"
      
    - name: Build
      run: dotnet build "NexusBank.slnx" --configuration Release --no-restore
      
    - name: Test
      run: dotnet test "NexusBank.slnx" --no-build --verbosity normal
